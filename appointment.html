<!DOCTYPE html>
<html>
<head>
    <title>Book Appointment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Book Appointment - Pranayuv Hospital</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="appointment.html">Appointment</a>
        <a href="about.html">About</a>
    </nav>
</header>

<div class="container">

    <div class="card">
        <h2>Appointment Form</h2>

        <input type="text" id="name" placeholder="Enter your name"><br>
        <input type="number" id="age" placeholder="Enter your age"><br>

        <select id="doctor">
            <option value="">Select Doctor</option>
            <option>Dr. Reddy - Cardiologist</option>
            <option>Dr. Priya - Pediatrician</option>
            <option>Dr. Sharma - Orthopedic</option>
        </select><br>

        <input type="date" id="date"><br>

        <button onclick="bookAppointment()">Book Appointment</button>

        <!-- Book another -->
        <button onclick="resetForm()" style="display:none;" id="anotherBtn">
            Book Another Appointment
        </button>

        <p id="message"></p>
    </div>

</div>

<footer>
    <p>© 2026 Pranayuv Hospital</p>
</footer>

<script src="script.js"></script>

</body>
</html>
